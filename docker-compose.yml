# =============================================================
# PersonalAIBotV2 — Docker Compose
# Usage:
#   docker compose up -d          # Start
#   docker compose logs -f        # View logs
#   docker compose down           # Stop
# =============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-ai-bot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Persist SQLite database & logs
      - ./data:/app/data
      - ./server/logs:/app/server/logs
      # Persist provider registry (editable without rebuild)
      - ./server/provider-registry.json:/app/server/provider-registry.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
