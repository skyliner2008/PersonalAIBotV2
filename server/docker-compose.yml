# Docker Compose for PersonalAIBotV2
# 
# Usage: docker-compose up -d
# Stop: docker-compose down

services:
  # Main application
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-ai-bot
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      # Add your environment variables here or use .env file
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      # Uncomment if using Redis
      # - redis
    networks:
      - ai-bot-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for caching (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: personal-ai-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - ai-bot-network
  #   command: redis-server --appendonly yes

networks:
  ai-bot-network:
    driver: bridge

volumes:
  # Uncomment if using Redis
  # redis-data:
